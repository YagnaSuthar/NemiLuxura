<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>નેમLUXURA Logo</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #ffffff;
    }
    
    .logo {
      display: inline-block;
      position: relative;
      background: #E5E5E5;
      padding: 15px 35px 20px 35px;
      width: fit-content;
    }
    
    .logo-small {
      position: absolute;
      top: 31px;
      left: 3px;
      font-size: 22px;
      color: #2B3A67;
      font-family: "Noto Sans Gujarati", "Mukta", sans-serif;
      font-weight: 600;
      line-height: 1;
    }
    
    .logo-main {
      display: block;
      font-size: 56px;
      font-weight: 900;
      color: #2B3A67;
      font-family: "Poppins", "Arial Black", "Helvetica", sans-serif;
      letter-spacing: 3px;
      line-height: 1;
      padding-top: 8px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <span class="logo-small">નેમ</span>
    <span class="logo-main">LUXURA</span>
  </div>
</body>
</html>
